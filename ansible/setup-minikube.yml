---
# =============================================================================
# Ansible Playbook: Setup Minikube (Docker driver) on Ubuntu/Debian
# Usage:  ansible-playbook -i inventory.ini setup-minikube.yml
# =============================================================================

- name: Setup Minikube with Docker driver
  hosts: local
  become: true          # sudo for system-level installs
  vars:
    kubectl_version: "v1.30.0"
    minikube_version: "v1.33.0"
    minikube_driver: "docker"
    minikube_cpus: 2
    minikube_memory: "2200mb"
    regular_user: "{{ ansible_env.SUDO_USER | default(ansible_user_id) }}"

  tasks:

    # ── 1. System prerequisites ──────────────────────────────────────────────
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install system dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - conntrack
          - socat
        state: present

    # ── 2. Docker ────────────────────────────────────────────────────────────
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: >
          deb [arch=amd64]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        state: present
        filename: docker

    - name: Install Docker Engine
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Enable and start Docker service
      systemd:
        name: docker
        state: started
        enabled: true

    - name: Add regular user to docker group
      user:
        name: "{{ regular_user }}"
        groups: docker
        append: true

    # ── 3. kubectl ───────────────────────────────────────────────────────────
    - name: Download kubectl binary
      get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: "0755"
        force: false

    - name: Verify kubectl installation
      command: kubectl version --client --output=yaml
      register: kubectl_ver
      changed_when: false

    - name: Show kubectl version
      debug:
        msg: "{{ kubectl_ver.stdout }}"

    # ── 4. Minikube ──────────────────────────────────────────────────────────
    - name: Download Minikube binary
      get_url:
        url: "https://storage.googleapis.com/minikube/releases/{{ minikube_version }}/minikube-linux-amd64"
        dest: /usr/local/bin/minikube
        mode: "0755"
        force: false

    - name: Verify Minikube installation
      command: minikube version
      register: minikube_ver
      changed_when: false

    - name: Show Minikube version
      debug:
        msg: "{{ minikube_ver.stdout }}"

    # ── 5. Start Minikube cluster ────────────────────────────────────────────
    - name: Check if Minikube cluster is already running
      become: false
      command: minikube status --format='{{ "{{" }}.Host{{ "}}" }}'
      register: minikube_status
      failed_when: false
      changed_when: false

    - name: Start Minikube with Docker driver
      become: false                    # minikube must run as regular user
      command: >
        minikube start
        --driver={{ minikube_driver }}
        --cpus={{ minikube_cpus }}
        --memory={{ minikube_memory }}
        --addons=ingress
      when: minikube_status.stdout != "Running"
      register: minikube_start

    - name: Show Minikube start output
      debug:
        msg: "{{ minikube_start.stdout_lines }}"
      when: minikube_start is changed

    # ── 6. Enable useful addons ──────────────────────────────────────────────
    - name: Enable Minikube metrics-server addon
      become: false
      command: minikube addons enable metrics-server
      changed_when: false

    - name: Enable Minikube dashboard addon
      become: false
      command: minikube addons enable dashboard
      changed_when: false

    # ── 7. Final verification ────────────────────────────────────────────────
    - name: Get cluster nodes
      become: false
      command: kubectl get nodes -o wide
      register: nodes_out
      changed_when: false

    - name: Display cluster nodes
      debug:
        msg: "{{ nodes_out.stdout_lines }}"

    - name: Print success message
      debug:
        msg: |
          ✅  Minikube is running with Docker driver!
          Run  `minikube dashboard`  to open the Kubernetes UI.
          Run  `minikube ip`          to get the cluster IP.
