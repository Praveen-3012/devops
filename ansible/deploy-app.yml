---
# =============================================================================
# Ansible Playbook: Deploy application to Minikube
# Usage:  ansible-playbook -i inventory.ini deploy-app.yml \
#           -e "dockerhub_username=<YOUR_USERNAME>"
# =============================================================================

- name: Deploy DevOps Demo App to Minikube
  hosts: local
  become: false
  vars:
    dockerhub_username: "{{ dockerhub_username | default('changeme') }}"
    image_tag: "latest"
    k8s_manifests_dir: "../k8s"

  tasks:

    - name: Check Minikube is running
      command: minikube status --format='{{ "{{" }}.Host{{ "}}" }}'
      register: mk_status
      changed_when: false
      failed_when: mk_status.stdout != "Running"

    - name: Patch deployment image with correct DockerHub username
      replace:
        path: "{{ k8s_manifests_dir }}/deployment.yaml"
        regexp: '<YOUR_DOCKERHUB_USERNAME>'
        replace: "{{ dockerhub_username }}"

    - name: Apply Kubernetes Deployment
      command: kubectl apply -f {{ k8s_manifests_dir }}/deployment.yaml
      register: deploy_result

    - name: Apply Kubernetes Service
      command: kubectl apply -f {{ k8s_manifests_dir }}/service.yaml
      register: svc_result

    - name: Wait for deployment to be ready
      command: >
        kubectl rollout status deployment/devops-demo-app
        --timeout=120s
      register: rollout

    - name: Get app URL via Minikube
      command: minikube service devops-demo-app-service --url
      register: app_url
      changed_when: false

    - name: Print application URL
      debug:
        msg: "🚀 Application is live at: {{ app_url.stdout }}"
