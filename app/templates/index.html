<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevOps Demo App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 48px;
      text-align: center;
      max-width: 480px;
      width: 90%;
    }
    .badge {
      display: inline-block;
      background: #22c55e22;
      color: #22c55e;
      border: 1px solid #22c55e55;
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 0.8rem;
      margin-bottom: 24px;
      letter-spacing: 0.05em;
    }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    p  { color: #94a3b8; margin-bottom: 32px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .info-item {
      background: #0f172a;
      border-radius: 10px;
      padding: 16px;
    }
    .info-item .label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; }
    .info-item .value { font-size: 1rem; font-weight: 600; color: #f1f5f9; margin-top: 4px; }
    .pipeline { display: flex; justify-content: center; gap: 8px; margin-top: 32px; flex-wrap: wrap; }
    .step {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.78rem;
      color: #94a3b8;
    }
    .step.active { border-color: #6366f1; color: #6366f1; background: #6366f111; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">● Running in Kubernetes</div>
    <h1>DevOps Demo App</h1>
    <p>Deployed via GitHub Actions → DockerHub → Minikube</p>
    <div class="info-grid">
      <div class="info-item">
        <div class="label">Pod Hostname</div>
        <div class="value">{{ hostname }}</div>
      </div>
      <div class="info-item">
        <div class="label">App Version</div>
        <div class="value">v{{ version }}</div>
      </div>
    </div>
    <div class="pipeline">
      <div class="step active">GitHub</div>
      <div class="step active">Actions CI/CD</div>
      <div class="step active">DockerHub</div>
      <div class="step active">Minikube</div>
    </div>
  </div>
</body>
</html>
