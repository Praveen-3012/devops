<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood-Based Music Recommender</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.1em;
            color: #aaa;
            margin-bottom: 40px;
        }

        .moods-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .mood-btn {
            padding: 30px;
            border: 2px solid #0099ff;
            background: rgba(0, 153, 255, 0.1);
            color: #fff;
            font-size: 1.2em;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .mood-btn:hover {
            background: rgba(0, 153, 255, 0.3);
            border-color: #00d4ff;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 153, 255, 0.2);
        }

        .emoji {
            font-size: 2.5em;
        }

        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #333;
            color: #666;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }

            .moods-grid {
                grid-template-columns: 1fr 1fr;
            }

            .mood-btn {
                padding: 20px;
                font-size: 1em;
            }

            .emoji {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Mood-Based Music Recommender</h1>
        <p class="subtitle">Select your current mood and discover music recommendations</p>

        <div class="moods-grid">
            {% for mood_name, mood_data in moods.items() %}
            <a href="/mood/{{ mood_name }}" class="mood-btn">
                <span class="emoji">{{ mood_data.emoji }}</span>
                <span>{{ mood_name }}</span>
            </a>
            {% endfor %}
        </div>

        <div class="footer">
            <p>🎧 Click on any mood to see song recommendations</p>
        </div>
    </div>
</body>
</html>
