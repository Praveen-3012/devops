# =============================================================================
# GitHub Actions: CI/CD Pipeline
# Triggers on push to main branch or pull requests
# Stages: Test → Build Docker Image → Push to DockerHub
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  IMAGE_NAME: devops-demo-app

jobs:

  # ── Stage 1: Test ────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install pytest

      - name: Create basic smoke test
        run: |
          cat > test_app.py << 'EOF'
          import pytest
          import sys
          sys.path.insert(0, "app")
          from app import app

          @pytest.fixture
          def client():
              app.config["TESTING"] = True
              with app.test_client() as c:
                  yield c

          def test_home_returns_200(client):
              response = client.get("/")
              assert response.status_code == 200

          def test_health_endpoint(client):
              response = client.get("/health")
              assert response.status_code == 200
              data = response.get_json()
              assert data["status"] == "healthy"
          EOF

      - name: Run tests
        run: pytest test_app.py -v

  # ── Stage 2: Build & Push Docker Image ──────────────────────────────────
  build-and-push:
    name: Build & Push to DockerHub
    runs-on: ubuntu-latest
    needs: test                          # only runs if tests pass
    if: github.ref == 'refs/heads/main'  # only on main branch push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest summary
        run: |
          echo "### Docker Image Published 🐳" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
